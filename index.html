<!DOCTYPE html>
<html>
<head>
  <title>Niche Spots Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    #map {
      height: 100vh;
      width: 100vw;
    }
    #revealBtn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 10000;
      padding: 10px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<button id="revealBtn">DEV</button>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="spots.js"></script>

</body>
</html>
