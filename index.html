<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Quest Map</title>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    /* DEV PANEL */
    #devPanel {
      position: fixed;
      top: 15px;
      right: 15px;
      width: 260px;
      z-index: 999999;

      background: rgba(255,255,255,0.95);
      border: 2px solid #111;
      border-radius: 12px;
      padding: 10px;

      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }

    #revealBtn {
      width: 100%;
      padding: 10px;
      font-weight: bold;

      border: none;
      border-radius: 8px;
      cursor: pointer;

      background: black;
      color: white;

      margin-bottom: 8px;
    }

    #info {
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }

    #wheelBtn {
      position: absolute;
      top: 60px;
      left: 10px;
      z-index: 99999;
      padding: 10px;
      background: white;
      border: 1px solid #ccc;
      border-radius: 6px;
      cursor: pointer;
    }

    .ok { color: green; font-weight: bold; }
    .err { color: red; font-weight: bold; }
    .warn { color: orange; font-weight: bold; }
  </style>
</head>

<body>
  
  <div id="devPanel">
    <button id="revealBtn">DEV PANEL</button>
    <div id="info">Initializing...</div>
    <button id="wheelBtn">Random</button>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="spots.js"></script>

</body>
</html>
