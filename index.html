<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Niche Spots Map</title>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    .dev-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 320px;
      background: rgba(20, 20, 20, 0.9);
      color: #0f0;
      font-family: monospace;
      border: 1px solid #333;
      border-radius: 8px;
      z-index: 9999;
      overflow: hidden;
    }
    
    .dev-header {
      padding: 6px 10px;
      background: #111;
      font-weight: bold;
    }
    
    .dev-content {
      padding: 10px;
      max-height: 300px;
      overflow-y: auto;
    }
    
    /* minimized state */
    .dev-panel.minimized .dev-content {
      display: none;
    }
    
    /* toggle button under panel */
    .toggle-panel-btn {
      position: absolute;
      top: 340px; /* adjust if needed */
      right: 10px;
      width: 320px;
    
      padding: 8px;
      background: #111;
      color: #0f0;
      border: 1px solid #0f0;
      border-radius: 6px;
    
      cursor: pointer;
      font-family: monospace;
    }

    #revealBtn {
      width: 100%;
      padding: 10px;
      font-weight: bold;

      border: none;
      border-radius: 8px;
      cursor: pointer;

      background: black;
      color: white;

      margin-bottom: 8px;
    }

    #info {
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }

    .ok { color: green; font-weight: bold; }
    .err { color: red; font-weight: bold; }
    .warn { color: orange; font-weight: bold; }
  </style>
</head>

<body>

  <div id="devPanel" class="dev-panel">
    <div class="dev-header">
      <span>Dev Panel</span>
    </div>
  
    <div id="info" class="dev-content"></div>
  </div>
  
  <!-- BUTTON UNDER PANEL -->
  <button id="togglePanelBtn" class="toggle-panel-btn">
    Minimize Panel
  </button>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="spots.js"></script>

</body>
</html>
