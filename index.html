<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Niche Spots Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet"
    href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    /* DEV BUTTON */
    #revealBtn {
      position: fixed;

      top: 20px;
      right: 20px;

      z-index: 999999;

      padding: 12px 16px;

      background: white;
      border: 2px solid black;
      border-radius: 8px;

      font-weight: bold;
      cursor: pointer;

      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    #revealBtn:hover {
      background: #f0f0f0;
    }
  </style>
</head>

<body>

  <!-- BUTTON -->
  <button id="revealBtn">DEV</button>

  <!-- MAP -->
  <div id="map"></div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <!-- Your JS -->
  <script src="spots.js"></script>

</body>

</html>
