<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side Quest Map</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    #map {
      height: 100vh;
      width: 100vw;
    }

    /* PANEL BOTTOM LEFT */
    #panel {
      position: fixed;
      bottom: 15px;
      left: 15px;
      width: 260px;
      z-index: 999999;

      background: rgba(255,255,255,0.95);
      border: 2px solid #111;
      border-radius: 12px;
      padding: 10px;

      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
    }

    #revealBtn, {
      width: 100%;
      padding: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-bottom: 8px;
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      background: black;
      color: white;
    }

    #info {
      font-size: 13px;
      line-height: 1.4;
      word-break: break-word;
    }

    .ok { color: green; font-weight: bold; }
    .err { color: red; font-weight: bold; }
    .warn { color: orange; font-weight: bold; }
  </style>
</head>

<body>

  <div id="panel">
    <button id="revealBtn">DEV Panel</button>
    <div id="info">Initializing...</div><br>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js?v=" + Date.now()></script>
  <script src="spots.js?v=" + Date.now()"></script>

</body>
</html>
